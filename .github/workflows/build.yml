name: Build

on:
  workflow_dispatch:
#  push:
#    branches:
#      - main
#      - master
#      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Decode keystore from Base64
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Warning: KEYSTORE_BASE64 secret not set. Building without signing."
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > ./infinity.keystore

      - name: Create keystore.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "Warning: Signing secrets not fully configured. Skipping keystore.properties."
            exit 0
          fi
          cat > keystore.properties << EOF
          storeFile=./infinity.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      - name: Build Debug APK (test)
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: continuum-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: continuum-release-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Run Unit Tests
        if: always()
        run: ./gradlew test --stacktrace

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: app/build/test-results/
          if-no-files-found: warn
