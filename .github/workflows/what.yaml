name: what

on:
  workflow_dispatch:
#  push:
#    branches:
#      - main
#      - master
#      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Decode keystore from Base64
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: KEYSTORE_BASE64 secret not set"
            exit 1
          fi
          
          echo "Current working directory: $(pwd)"
          
          # Decode and save in the same location as keystore.properties
          echo "$KEYSTORE_BASE64" | base64 -d > ./infinity.keystore
          
          if [ -f ./infinity.keystore ]; then
            echo "✓ Keystore created at: $(pwd)/infinity.keystore"
            ls -lh ./infinity.keystore
          else
            echo "✗ Failed to create keystore"
            exit 1
          fi

      - name: Create keystore properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "Current working directory: $(pwd)"
          
          cat > keystore.properties << EOF
          storeFile=./infinity.keystore
          storePassword=$KEYSTORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          
          echo "✓ keystore.properties created"
          cat keystore.properties
